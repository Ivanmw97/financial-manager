name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 12 */5 * *'  # Every 5 days at 12:00 UTC
  workflow_dispatch:         # Allow manual trigger

jobs:
  ping:
    name: Ping Supabase REST API
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase project
        run: |
          curl -sf "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -o /dev/null \
            -w "HTTP %{http_code}\n"
          echo "Supabase keep-alive ping sent successfully"
